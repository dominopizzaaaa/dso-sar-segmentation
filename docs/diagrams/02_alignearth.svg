<svg xmlns="http://www.w3.org/2000/svg" width="900" height="400" viewBox="0 0 900 400" font-family="Arial, sans-serif">
  <rect width="900" height="400" fill="#F7F9FB"/>
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#0A1929">Stage 1 — AlignEarth Sliding-Window Inference</text>

  <!-- Full image -->
  <rect x="40" y="70" width="200" height="200" fill="#D8DEE4" stroke="#5A6C7A" stroke-width="1.5"/>
  <text x="140" y="60" text-anchor="middle" font-size="12" fill="#5A6C7A">Full SAR image (e.g. 14k × 15k)</text>
  <!-- overlapping tiles -->
  <rect x="55" y="85" width="70" height="70" fill="none" stroke="#2E86AB" stroke-width="2"/>
  <rect x="90" y="120" width="70" height="70" fill="none" stroke="#E67E22" stroke-width="2"/>
  <rect x="125" y="85" width="70" height="70" fill="none" stroke="#9B59B6" stroke-width="2"/>
  <text x="140" y="285" text-anchor="middle" font-size="10" fill="#5A6C7A">448×448 tiles, 224 stride (50% overlap)</text>

  <line x1="240" y1="170" x2="285" y2="170" stroke="#00A896" stroke-width="2.5" marker-end="url(#ar2)"/>

  <!-- single tile -->
  <rect x="295" y="120" width="100" height="100" fill="#FFFFFF" stroke="#2E86AB" stroke-width="2"/>
  <text x="345" y="110" text-anchor="middle" font-size="11" fill="#5A6C7A">one 448 tile</text>
  <text x="345" y="175" text-anchor="middle" font-size="10" fill="#5A6C7A">resize→224</text>

  <line x1="395" y1="170" x2="440" y2="170" stroke="#00A896" stroke-width="2.5" marker-end="url(#ar2)"/>

  <!-- model -->
  <rect x="450" y="120" width="120" height="100" rx="8" fill="#FFFFFF" stroke="#9B59B6" stroke-width="1.5"/>
  <rect x="450" y="120" width="6" height="100" rx="3" fill="#9B59B6"/>
  <text x="513" y="155" text-anchor="middle" font-size="12" font-weight="bold" fill="#0A1929">AlignEarth</text>
  <text x="513" y="173" text-anchor="middle" font-size="10" fill="#5A6C7A">ViT-B/16</text>
  <text x="513" y="189" text-anchor="middle" font-size="10" fill="#5A6C7A">CLIP cosine sim</text>
  <text x="513" y="204" text-anchor="middle" font-size="10" fill="#5A6C7A">→ 6-class probs</text>

  <line x1="570" y1="170" x2="615" y2="170" stroke="#00A896" stroke-width="2.5" marker-end="url(#ar2)"/>

  <!-- aggregate -->
  <rect x="625" y="120" width="120" height="100" rx="8" fill="#FFFFFF" stroke="#00A896" stroke-width="1.5"/>
  <rect x="625" y="120" width="6" height="100" rx="3" fill="#00A896"/>
  <text x="688" y="150" text-anchor="middle" font-size="11" font-weight="bold" fill="#0A1929">Aggregate</text>
  <text x="688" y="168" text-anchor="middle" font-size="10" fill="#5A6C7A">sum probs in</text>
  <text x="688" y="182" text-anchor="middle" font-size="10" fill="#5A6C7A">overlaps</text>
  <text x="688" y="200" text-anchor="middle" font-size="10" fill="#5A6C7A">÷ count, argmax</text>

  <line x1="688" y1="220" x2="688" y2="265" stroke="#00A896" stroke-width="2.5" marker-end="url(#ar2)"/>
  <rect x="615" y="270" width="146" height="50" rx="8" fill="#FFFFFF" stroke="#1A7A4A" stroke-width="1.5"/>
  <text x="688" y="292" text-anchor="middle" font-size="11" font-weight="bold" fill="#0A1929">P8 label map</text>
  <text x="688" y="308" text-anchor="middle" font-size="10" fill="#5A6C7A">hard class per pixel</text>

  <text x="40" y="360" font-size="11" fill="#5A6C7A" font-weight="bold">Why 50% overlap?</text>
  <text x="40" y="378" font-size="10" fill="#9BAAB8">Every pixel is covered by ≥4 tiles; averaging their probabilities removes tile-boundary artefacts and stabilises low-confidence pixels.</text>

  <defs>
    <marker id="ar2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#00A896"/>
    </marker>
  </defs>
</svg>
