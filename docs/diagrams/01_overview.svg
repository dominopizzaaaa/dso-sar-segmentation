<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" font-family="Arial, sans-serif">
  <rect width="900" height="420" fill="#F7F9FB"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#0A1929">SAR Segmentation Pipeline — End to End</text>

  <!-- Input -->
  <rect x="30" y="80" width="150" height="80" rx="8" fill="#FFFFFF" stroke="#5A6C7A" stroke-width="1.5"/>
  <text x="105" y="112" text-anchor="middle" font-size="13" font-weight="bold" fill="#0A1929">Input</text>
  <text x="105" y="132" text-anchor="middle" font-size="11" fill="#5A6C7A">Umbra X-band</text>
  <text x="105" y="148" text-anchor="middle" font-size="11" fill="#5A6C7A">SAR .tif (0.25m)</text>

  <!-- arrow -->
  <line x1="180" y1="120" x2="215" y2="120" stroke="#00A896" stroke-width="2.5" marker-end="url(#ar)"/>

  <!-- Stage 0 preprocessing -->
  <rect x="220" y="80" width="150" height="80" rx="8" fill="#FFFFFF" stroke="#2E86AB" stroke-width="1.5"/>
  <rect x="220" y="80" width="6" height="80" rx="3" fill="#2E86AB"/>
  <text x="298" y="108" text-anchor="middle" font-size="12" font-weight="bold" fill="#0A1929">Stage 0</text>
  <text x="298" y="126" text-anchor="middle" font-size="11" fill="#5A6C7A">Preprocess</text>
  <text x="298" y="142" text-anchor="middle" font-size="10" fill="#5A6C7A">2–98% stretch</text>

  <line x1="370" y1="120" x2="405" y2="120" stroke="#00A896" stroke-width="2.5" marker-end="url(#ar)"/>

  <!-- VLM branch -->
  <rect x="410" y="80" width="150" height="80" rx="8" fill="#FFFFFF" stroke="#9B59B6" stroke-width="1.5"/>
  <rect x="410" y="80" width="6" height="80" rx="3" fill="#9B59B6"/>
  <text x="488" y="104" text-anchor="middle" font-size="12" font-weight="bold" fill="#0A1929">VLM / LLM</text>
  <text x="488" y="121" text-anchor="middle" font-size="10" fill="#5A6C7A">GeoChat → Groq</text>
  <text x="488" y="136" text-anchor="middle" font-size="10" fill="#5A6C7A">scene type +</text>
  <text x="488" y="150" text-anchor="middle" font-size="10" fill="#5A6C7A">thresholds</text>

  <line x1="560" y1="120" x2="595" y2="120" stroke="#00A896" stroke-width="2.5" marker-end="url(#ar)"/>

  <!-- Stage 1 AlignEarth -->
  <rect x="600" y="80" width="150" height="80" rx="8" fill="#FFFFFF" stroke="#2E86AB" stroke-width="1.5"/>
  <rect x="600" y="80" width="6" height="80" rx="3" fill="#2E86AB"/>
  <text x="678" y="104" text-anchor="middle" font-size="12" font-weight="bold" fill="#0A1929">Stage 1 (P8)</text>
  <text x="678" y="121" text-anchor="middle" font-size="10" fill="#5A6C7A">AlignEarth</text>
  <text x="678" y="136" text-anchor="middle" font-size="10" fill="#5A6C7A">zero-shot tiles</text>
  <text x="678" y="150" text-anchor="middle" font-size="10" fill="#5A6C7A">448→224, argmax</text>

  <!-- down arrow -->
  <line x1="678" y1="160" x2="678" y2="205" stroke="#00A896" stroke-width="2.5" marker-end="url(#ar)"/>

  <!-- Stage 2 P10 -->
  <rect x="600" y="210" width="150" height="90" rx="8" fill="#FFFFFF" stroke="#E67E22" stroke-width="1.5"/>
  <rect x="600" y="210" width="6" height="90" rx="3" fill="#E67E22"/>
  <text x="678" y="234" text-anchor="middle" font-size="12" font-weight="bold" fill="#0A1929">Stage 2 (P10)</text>
  <text x="678" y="252" text-anchor="middle" font-size="10" fill="#5A6C7A">soften σ=3</text>
  <text x="678" y="267" text-anchor="middle" font-size="10" fill="#5A6C7A">scene multipliers</text>
  <text x="678" y="282" text-anchor="middle" font-size="10" fill="#5A6C7A">SAR decomp</text>
  <text x="678" y="296" text-anchor="middle" font-size="10" fill="#5A6C7A">guided filter</text>

  <line x1="600" y1="255" x2="455" y2="255" stroke="#00A896" stroke-width="2.5" marker-end="url(#ar)"/>

  <!-- Stage 3 P11 -->
  <rect x="300" y="210" width="150" height="90" rx="8" fill="#FFFFFF" stroke="#00A896" stroke-width="1.5"/>
  <rect x="300" y="210" width="6" height="90" rx="3" fill="#00A896"/>
  <text x="378" y="234" text-anchor="middle" font-size="12" font-weight="bold" fill="#0A1929">Stage 3 (P11)</text>
  <text x="378" y="252" text-anchor="middle" font-size="10" fill="#5A6C7A">water flood-fill</text>
  <text x="378" y="267" text-anchor="middle" font-size="10" fill="#5A6C7A">watershed carving</text>
  <text x="378" y="282" text-anchor="middle" font-size="10" fill="#5A6C7A">building outlines</text>

  <line x1="300" y1="255" x2="195" y2="255" stroke="#00A896" stroke-width="2.5" marker-end="url(#ar)"/>

  <!-- Output -->
  <rect x="30" y="210" width="150" height="90" rx="8" fill="#FFFFFF" stroke="#1A7A4A" stroke-width="1.5"/>
  <rect x="30" y="210" width="6" height="90" rx="3" fill="#1A7A4A"/>
  <text x="108" y="244" text-anchor="middle" font-size="12" font-weight="bold" fill="#0A1929">Output</text>
  <text x="108" y="264" text-anchor="middle" font-size="10" fill="#5A6C7A">6-class map PNG</text>
  <text x="108" y="280" text-anchor="middle" font-size="10" fill="#5A6C7A">+ .npy array</text>

  <!-- Legend -->
  <text x="30" y="350" font-size="11" font-weight="bold" fill="#0A1929">Classes:</text>
  <rect x="90" y="341" width="12" height="12" fill="#000000"/><text x="107" y="351" font-size="10" fill="#5A6C7A">background</text>
  <rect x="180" y="341" width="12" height="12" fill="#FF0000"/><text x="197" y="351" font-size="10" fill="#5A6C7A">building</text>
  <rect x="258" y="341" width="12" height="12" fill="#FFFF00" stroke="#999"/><text x="275" y="351" font-size="10" fill="#5A6C7A">road</text>
  <rect x="318" y="341" width="12" height="12" fill="#008000"/><text x="335" y="351" font-size="10" fill="#5A6C7A">vegetation</text>
  <rect x="408" y="341" width="12" height="12" fill="#0000FF"/><text x="425" y="351" font-size="10" fill="#5A6C7A">water</text>
  <rect x="478" y="341" width="12" height="12" fill="#8B5A2B"/><text x="495" y="351" font-size="10" fill="#5A6C7A">bareland</text>

  <text x="30" y="392" font-size="10" fill="#9BAAB8">Note: the VLM/LLM step is optional (--scene-type auto). With an explicit scene type, thresholds come from a hard-coded table.</text>

  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#00A896"/>
    </marker>
  </defs>
</svg>
